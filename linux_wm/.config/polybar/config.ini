[colors]
; (A)RGB or (AA)RRGGBB
background     = #c000
background-alt = #c888
foreground     = #fff
primary        = #ddd
secondary      = #888
alert          = #e44
disabled       = #888
crit           = #c00
warn           = #fc0

[bar/base]

; monitor =
; monitor-fallback =
; monitor-strict = false
; monitor-exact = true

bottom = false
fixed-center = true

width  = 100%:-10
height = 20
offset-x = 5
offset-y = 5

background = ${colors.background}
foreground = ${colors.foreground}

radius = 0

line-size = 2
line-color = ${colors.primary}

border-size = 1
border-color = ${colors.primary}

padding-left = 0
padding-right = 1

module-margin = 1

font-0 = Adwaita Mono:style=Bold:size=12;3
font-1 = Symbols Nerd Font:size=14;3
font-2 = nonicons:size=14;3

separator = ""
separator-foreground = ${colors.primary}

; dim-value = 1.0

; wm-name =

; locale =

tray-position = right
tray-detached = false
tray-maxsize = 24
tray-background = ${colors.background}
tray-offset-x = 0
tray-offset-y = 0
tray-padding = 8
tray-scale = 1.0

; dpi-x = 96
; dpi-y = 96

enable-ipc = true

; click-left =
; click-middle =
; click-right =
; scroll-up =
; scroll-down =
; double-click-left =
; double-click-middle =
; double-click-right =

cursor-click = pointer
cursor-scroll = ns-resize

[bar/awesome]

inherit = bar/base

override-redirect = false

modules-left = xworkspaces pulseaudio backlight xkeyboard
modules-center = date1 date2
modules-right = temperature cpu memory wlan eth battery

[bar/i3]

inherit = bar/base

override-redirect = true

wm-restack = i3

modules-left = i3 pulseaudio backlight xkeyboard
modules-center = date1 date2
modules-right = temperature cpu memory wlan eth battery

[module/i3]
type = internal/i3

label-focused = "%name%"
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.primary}
label-focused-padding = 1

label-unfocused = "%name%"
label-unfocused-padding = 1

label-urgent = "%name%"
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

[module/xworkspaces]
type = internal/xworkspaces

label-active = "%name%"
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.primary}
label-active-padding = 1

label-occupied = "%name%"
label-occupied-padding = 1

label-urgent = "%name%"
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = "%name%"
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xkeyboard]
type = internal/xkeyboard

format = "<label-layout> <label-indicator>"

label-layout = "%layout%"
label-layout-foreground = ${colors.primary}

label-indicator = "%icon%"

indicator-icon-0 = "num lock;;N"
indicator-icon-1 = "caps lock;;C"
indicator-icon-2 = "scroll lock;;S"

label-indicator-padding = 1
label-indicator-margin = 1
label-indicator-foreground = ${colors.foreground}
label-indicator-background = ${colors.background-alt}
label-indicator-underline = ${colors.primary}

[module/pulseaudio]
type = internal/pulseaudio

use-ui-max = true
interval = 1

format-volume = "<ramp-volume> <label-volume>"
format-muted = "ůįĚü <label-muted>"
format-muted-foreground = ${colors.warn}

label-volume = "%percentage:2%%"
label-muted = "--%"

ramp-volume-0 = "ůįēŅ"
ramp-volume-1 = "ůįĖÄ"
ramp-volume-2 = "ůįēĺ"

[module/backlight]
type = internal/backlight

enable-scroll = true
scroll-interval = 1

format = "<ramp> <label>"

label = "%percentage:2%%"

ramp-0 = "ůįÉě"
ramp-1 = "ůįÉĚ"
ramp-2 = "ůįÉü"
ramp-3 = "ůįÉ†"

[module/temperature]
type = internal/temperature
interval = 1
zone-type = x86_pkg_temp

base-temperature = 40
warn-temperature = 70

units = true

format = "<ramp> <label>"
format-warn = "<ramp> <label-warn>"

label = "%temperature-c:2%"
label-warn = "%temperature-c:2%"
label-warn-foreground = ${colors.crit}

ramp-0 = "Ôčč"
ramp-1 = "Ôčä"
ramp-2 = "ÔčČ"
ramp-3 = "Ôčą"
ramp-3-foreground = ${colors.warn}
ramp-4 = "Ôčá"
ramp-4-foreground = ${colors.crit}

[module/cpu]
type = internal/cpu
interval = 1

warn-percentage = 80

format = "ůįął <label>"
format-warn = "ůįął <label-warn>"
format-warn-foreground = ${colors.warn}

label = "%percentage:2%%"
label-warn = "%percentage:2%%"

[module/memory]
type = internal/memory
interval = 1

warn-percentage = 80

format = "ůįćõ <label>"
format-warn = "ůįćõ <label-warn>"
format-warn-foreground = ${colors.warn}

label = "%percentage_used:2%% (S: %percentage_swap_used:2%%)"
label-warn = "%percentage_used:2%% (S: %percentage_swap_used:2%%)"

[module/wlan]
type = internal/network
interval = 1
interface-type = wireless

ping-interval = 1

format-connected = "ůįĖ© <label-connected>"
format-packetloss = "ůĪõā <label-packetloss>"
format-packetloss-foreground = ${colors.warn}
format-disconnected = "ůįĖ™ <label-disconnected>"
format-disconnected-foreground = ${colors.crit}

label-connected = "%essid%, D: %downspeed:9% U: %upspeed:9%"
label-packetloss = "%essid%, D: %downspeed:9% U: %upspeed:9%"
label-disconnected = "-"

[module/eth]
type = internal/network
interval = 1
interface-type = wired

ping-interval = 1

format-connected = "ůįõ≥ <label-connected>"
format-packetloss = "ůįćł <label-packetloss>"
format-packetloss-foreground = ${colors.warn}
format-disconnected = "ůį≤õ <label-disconnected>"
format-disconnected-foreground = ${colors.crit}

label-connected = "D: %downspeed:9% U: %upspeed:9%"
label-packetloss = "D: %downspeed:9% U: %upspeed:9%"
label-disconnected = "-"

[module/battery]
type = internal/battery
poll-interval = 5

format-charging = "<animation-charging> <label-charging>"
format-discharging = "<ramp-capacity> <label-discharging>"
format-full = "<ramp-capacity> <label-full>"

label-charging = "%percentage:2%%"
label-discharging = "%percentage:2%%"
label-full = "%percentage:2%%"

ramp-capacity-0 = "ÔČĄ"
ramp-capacity-0-foreground = ${colors.crit}
ramp-capacity-1 = "ÔČÉ"
ramp-capacity-1-foreground = ${colors.warn}
ramp-capacity-2 = "ÔČā"
ramp-capacity-3 = "ÔČĀ"
ramp-capacity-4 = "ÔČÄ"

animation-charging-0 = "ÔČĄ"
animation-charging-1 = "ÔČÉ"
animation-charging-2 = "ÔČā"
animation-charging-3 = "ÔČĀ"
animation-charging-4 = "ÔČÄ"
animation-charging-framerate = 750

[module/date1]
type = internal/date
interval = 1

label = "%date%"

date = "(%a.) %Y-%m-%d"

[module/date2]
type = internal/date
interval = 1

label = "%time%"

time = "%H:%M:%S         "

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
